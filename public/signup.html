<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — PharmaRevo</title>
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="auth-card">

    <!-- Logo links back to landing page -->
    <a href="index.html" class="auth-logo">Pharma<span>Revo</span></a>

    <h2>Create Account</h2>
    <p class="sub">Join PharmaRevo and make a difference</p>

    <!-- Full Name -->
    <div class="input-group">
      <i class="fa fa-user"></i>
      <input type="text" id="name" placeholder="Full Name">
    </div>

    <!-- Email -->
    <div class="input-group">
      <i class="fa fa-envelope"></i>
      <input type="email" id="email" placeholder="Email Address">
    </div>

    <!-- Password -->
    <div class="input-group">
      <i class="fa fa-lock"></i>
      <input type="password" id="password" placeholder="Password">
    </div>

    <!-- Confirm Password -->
    <div class="input-group">
      <i class="fa fa-lock"></i>
      <input type="password" id="confirm" placeholder="Confirm Password">
    </div>

    <!-- Role Dropdown — this decides which dashboard opens after login -->
    <div class="input-group">
      <i class="fa fa-id-badge"></i>
      <select id="role">
        <option value="" disabled selected>Select Your Role</option>
        <option value="donor">Individual Donor</option>
        <option value="pharmacy">Pharmacy</option>
        <option value="ngo">NGO</option>
        <option value="corporate">Corporate (CSR)</option>
      </select>
    </div>

    <button class="auth-btn" onclick="signup()">Create Account</button>

    <!-- Shows success or error messages -->
    <p class="msg" id="msg"></p>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>

  </div>

  <script>
    async function signup() {

      // Read all field values
      const name     = document.getElementById("name").value.trim()
      const email    = document.getElementById("email").value.trim()
      const password = document.getElementById("password").value
      const confirm  = document.getElementById("confirm").value
      const role     = document.getElementById("role").value
      const msg      = document.getElementById("msg")

      // --- CLIENT SIDE VALIDATION ---
      // Always validate on frontend BEFORE sending to server
      // This saves unnecessary API calls

      if (!name || !email || !password || !role) {
        msg.textContent = "Please fill in all fields"
        return
      }

      if (password !== confirm) {
        msg.textContent = "Passwords do not match"
        return
      }

      if (password.length < 6) {
        msg.textContent = "Password must be at least 6 characters"
        return
      }

      // --- SEND TO BACKEND ---
      // fetch() sends an HTTP request to our Express server
      // We use POST because we are SENDING data (not just reading)

      try {

        const res  = await fetch("/api/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password, role })
        })

        const data = await res.json()

        if (data.status === "success") {
          msg.className = "msg success"
          msg.textContent = "Account created! Redirecting to login..."
          setTimeout(() => window.location.href = "login.html", 1500)
        } else {
          msg.textContent = data.message
        }

      } catch (err) {
        msg.textContent = "Server error. Is the server running?"
      }

    }
  </script>

</body>
</html>
